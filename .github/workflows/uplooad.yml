name: Build & Push Docker

on:
  push:
    branches: ['main']
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build + Push com cache
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/bank:latest
          cache-from: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/bank:buildcache
          cache-to: type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/bank:buildcache,mode=max
